<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>404 — Page Not Found · CTunes</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <style>
    .page-404 {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: calc(62px + env(safe-area-inset-top) + 40px) clamp(24px, 5vw, 60px) 80px;
      position: relative;
      overflow: hidden;
    }

    /* Ghost key grid background */
    .ghost-keys {
      position: absolute;
      inset: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 40px;
      pointer-events: none;
      opacity: 0.04;
    }

    .ghost-key {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      border: 1px solid currentColor;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
    }

    /* Main content */
    .err-content {
      position: relative;
      z-index: 2;
      max-width: 500px;
    }

    .err-keys {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .err-key {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-family: 'Space Mono', monospace;
      position: relative;
      animation: keyFloat 3s ease-in-out infinite;
      box-shadow: 0 8px 28px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.07) inset;
    }

    .err-key::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(145deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .err-key:nth-child(2) { animation-delay: 0.15s; }
    .err-key:nth-child(3) { animation-delay: 0.3s; }

    .err-key .letter {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .err-key .label {
      font-size: 0.5rem;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    @keyframes keyFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }

    .err-code {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .err-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 14px;
      line-height: 1.15;
    }

    .err-sub {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 36px;
    }

    .err-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 11px 22px;
      border-radius: 10px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-home:hover { opacity: 0.88; transform: translateY(-1px); }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      padding: 11px 22px;
      border-radius: 10px;
      border: 1px solid var(--border);
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover { color: var(--text); border-color: rgba(91,155,213,0.4); }
  </style>
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<!-- ── NAV ── -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <img src="logo.webp" alt="CTunes logo" />
      C<span>Tunes</span>
    </a>
    <a href="https://play.google.com/store/apps/details?id=com.anoop.myprojects.ctunes" target="_blank" rel="noopener noreferrer" class="nav-pill">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 16l-4-4h2.5V4h3v8H16l-4 4z"/><rect x="4" y="18" width="16" height="2" rx="1"/>
      </svg>
      Get it on Google Play
    </a>
  </div>
</nav>

<main id="main-content">
  <div class="page-404">

    <!-- Ghost key grid backdrop -->
    <div class="ghost-keys" aria-hidden="true" id="ghostGrid"></div>

    <div class="err-content">
      <!-- 4 • 0 • 4 keys -->
      <div class="err-keys" aria-hidden="true">
        <div class="err-key" style="background:#E57373;">
          <span class="letter">4</span>
          <span class="label">Kick</span>
        </div>
        <div class="err-key" style="background:#6B8299;">
          <span class="letter">0</span>
          <span class="label">Silence</span>
        </div>
        <div class="err-key" style="background:#7986CB;">
          <span class="letter">4</span>
          <span class="label">Clap</span>
        </div>
      </div>

      <p class="err-code">Error 404</p>
      <h1 class="err-title">This key has no sound.</h1>
      <p class="err-sub">The page you're looking for doesn't exist or has been moved. Head back home and keep the beat going.</p>

      <div class="err-actions">
        <a href="index.html" class="btn-home">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Back to home
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.anoop.myprojects.ctunes" target="_blank" rel="noopener noreferrer" class="btn-ghost">
          Download CTunes
        </a>
      </div>
    </div>

  </div>
</main>

<!-- ── FOOTER ── -->
<footer>
  <div class="footer-inner">
    <a href="index.html" class="footer-logo">
      <img src="logo.webp" alt="CTunes" style="width:24px;height:24px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:8px;" />
      C<span>Tunes</span>
    </a>
    <div class="footer-links">
      <a href="privacy.html">Privacy Policy</a>
      <small>© <span id="footer-year"></span> CTunes</small>
    </div>
  </div>
</footer>

<script>
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  /* Build ghost key grid */
  const COLORS = [
    '#E57373','#F06292','#BA68C8','#7986CB','#64B5F6','#4DB6AC',
    '#81C784','#FFD54F','#FF8A65','#A1887F','#90A4AE','#4FC3F7',
    '#F48FB1','#CE93D8','#80CBC4','#EF9A9A','#B39DDB','#80DEEA'
  ];
  const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
  const grid  = document.getElementById('ghostGrid');
  CHARS.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'ghost-key';
    el.style.color = COLORS[i % COLORS.length];
    el.textContent = c;
    grid.appendChild(el);
  });
</script>
</body>
</html>
